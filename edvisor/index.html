<!DOCTYPE html>
<html class="staticrypt-html">
    <head>
        <meta charset="utf-8" />
        <title>100 Partners</title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="robots" content="noindex, nofollow" />

        <!-- do not cache this page -->
        <meta http-equiv="cache-control" content="max-age=0" />
        <meta http-equiv="cache-control" content="no-cache" />
        <meta http-equiv="expires" content="0" />
        <meta http-equiv="expires" content="Tue, 01 Jan 1980 1:00:00 GMT" />
        <meta http-equiv="pragma" content="no-cache" />

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

        <style>
            :root {
                --bg: #ffffff;
                --ink: #0f0f0f;
                --muted: #8a8a85;
                --soft: #d9d8d2;
                --accent: #c2410c;
            }

            * { box-sizing: border-box; }

            .staticrypt-html { height: 100%; }

            .staticrypt-body {
                height: 100%;
                margin: 0;
                background: var(--bg);
                color: var(--ink);
                font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
                font-size: 13.5px;
                font-weight: 400;
                line-height: 1.6;
                -webkit-font-smoothing: antialiased;
                -moz-osx-font-smoothing: grayscale;
            }

            .staticrypt-content {
                min-height: 100%;
                background: var(--bg);
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                padding: 40px 20px;
            }

            .staticrypt-mast {
                width: 100%;
                max-width: 420px;
                border-bottom: 1px solid var(--ink);
                padding-bottom: 14px;
                margin-bottom: 40px;
                display: flex;
                justify-content: space-between;
                align-items: center;
                font-size: 11px;
                text-transform: lowercase;
                letter-spacing: 0.06em;
                color: var(--muted);
            }

            .staticrypt-mast .logo {
                color: var(--ink);
                font-weight: 600;
                letter-spacing: 0.04em;
            }

            .staticrypt-mast .tag {
                color: var(--muted);
            }

            .staticrypt-form {
                width: 100%;
                max-width: 420px;
                background: var(--bg);
                padding: 32px;
                border: 1px solid var(--ink);
                text-align: left;
            }

            .staticrypt-instructions {
                margin-bottom: 24px;
            }

            .staticrypt-title {
                font-size: 15px;
                font-weight: 600;
                color: var(--ink);
                margin: 0 0 8px;
                letter-spacing: -0.01em;
            }

            .staticrypt-instructions p:not(.staticrypt-title) {
                font-size: 12.5px;
                color: var(--muted);
                margin: 0;
                line-height: 1.55;
            }

            .staticrypt-hr {
                margin: 20px 0;
                border: 0;
                border-top: 1px solid var(--soft);
            }

            .staticrypt-password-container {
                position: relative;
                background: var(--bg);
                width: 100%;
                border: 1px solid var(--soft);
                margin: 0 0 14px;
            }

            .staticrypt-password-container:focus-within {
                border-color: var(--ink);
            }

            .staticrypt-form input[type="password"],
            .staticrypt-form input[type="text"] {
                background: transparent;
                border: 0;
                font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
                font-size: 13.5px;
                color: var(--ink);
                outline: 0;
                padding: 13px 42px 13px 14px;
                width: 100%;
            }

            .staticrypt-form input::placeholder {
                color: var(--muted);
                opacity: 1;
            }

            .staticrypt-toggle-password-visibility {
                cursor: pointer;
                height: 16px;
                opacity: 0.5;
                padding: 14px;
                position: absolute;
                right: 0;
                top: 50%;
                transform: translateY(-50%);
                width: 16px;
                box-sizing: content-box;
            }

            .staticrypt-toggle-password-visibility:hover {
                opacity: 0.85;
            }

            .staticrypt-form .staticrypt-decrypt-button {
                text-transform: lowercase;
                letter-spacing: 0.04em;
                outline: 0;
                background: var(--accent);
                width: 100%;
                border: 0;
                padding: 13px;
                color: #ffffff;
                font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
                font-size: 13px;
                font-weight: 500;
                cursor: pointer;
                transition: filter 0.15s ease;
            }

            .staticrypt-form .staticrypt-decrypt-button:hover,
            .staticrypt-form .staticrypt-decrypt-button:active,
            .staticrypt-form .staticrypt-decrypt-button:focus {
                background: var(--accent);
                filter: brightness(92%);
            }

            label.staticrypt-remember {
                display: flex;
                align-items: center;
                margin-bottom: 16px;
                font-size: 12px;
                color: var(--muted);
            }

            .staticrypt-remember input[type="checkbox"] {
                transform: scale(1.1);
                margin-right: 10px;
                accent-color: var(--accent);
            }

            .staticrypt-foot {
                width: 100%;
                max-width: 420px;
                margin-top: 24px;
                font-size: 10.5px;
                text-transform: lowercase;
                letter-spacing: 0.06em;
                color: var(--muted);
                text-align: center;
            }

            .hidden {
                display: none !important;
            }

            .staticrypt-spinner-container {
                height: 100%;
                display: flex;
                align-items: center;
                justify-content: center;
                background: var(--bg);
            }

            .staticrypt-spinner {
                display: inline-block;
                width: 1.5rem;
                height: 1.5rem;
                border: 0.2em solid var(--soft);
                border-right-color: var(--accent);
                border-radius: 50%;
                animation: spinner-border 0.75s linear infinite;
            }

            @keyframes spinner-border {
                100% { transform: rotate(360deg); }
            }

            @media screen and (-webkit-min-device-pixel-ratio: 0) {
                .staticrypt-form input[type="password"],
                .staticrypt-form input[type="text"] {
                    font-size: 16px;
                }
            }
        </style>
    </head>

    <body class="staticrypt-body">
        <div id="staticrypt_loading" class="staticrypt-spinner-container">
            <div class="staticrypt-spinner"></div>
        </div>

        <div id="staticrypt_content" class="staticrypt-content hidden">
            <div class="staticrypt-mast">
                <span class="logo">100 partners</span>

                    <input type="submit" class="staticrypt-decrypt-button" value="unlock" />
                </form>
            </div>

            <div class="staticrypt-foot">
