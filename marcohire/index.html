                --white: #ffffff;

            }

                font-size: 13.5px; font-weight: 400; line-height: 1.65;
                -webkit-font-smoothing: antialiased;

            ::selection { background: var(--accent); color: var(--bg); }

            .staticrypt-html { height: 100%; }
            .staticrypt-body { height: 100%; margin: 0; }
            .staticrypt-content {
                height: 100%;
                background: var(--bg);
                font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
            }

            .wrap {
                max-width: 520px;
                margin: 0 auto;
                padding: 40px 28px 80px;
            }

            .masthead {
                border-bottom: 1px solid var(--ink);
                padding: 14px 0; margin-bottom: 56px;
                display: flex; justify-content: space-between; align-items: center; gap: 16px;
            }
            .masthead .brand { display: flex; align-items: center; }
            .masthead .brand img { height: 52px; width: auto; display: block; }
            .masthead .meta {
                text-align: right; font-size: 11px; letter-spacing: 0.06em;
                color: var(--muted); text-transform: lowercase;
            }
            .masthead .meta b { color: var(--ink); font-weight: 600; }

            .intro { margin-bottom: 36px; }
            .intro h1 {
                font-size: 28px; font-weight: 500; line-height: 1.22; letter-spacing: -0.01em;
                margin: 0 0 14px; text-transform: lowercase;
            }
            .intro h1 .cursor {
                display: inline-block; width: 10px; height: 22px; background: var(--accent);
                vertical-align: -3px; margin-left: 4px; animation: blink 1.1s steps(1) infinite;
            }
            @keyframes blink { 50% { opacity: 0; } }
            .intro p {
                font-size: 13px; color: var(--ink);
                margin: 0 0 14px; line-height: 1.7;
            }
            .intro .muted { color: var(--muted); font-size: 12px; }

            .scan {
                border: 1px solid var(--ink); background: var(--white);
                padding: 14px 18px; font-size: 12px; line-height: 1.85;
                color: var(--muted); white-space: pre; overflow-x: auto; margin: 0 0 24px;
                font-family: inherit;
            }
            .scan .v { color: var(--ink); }
            .scan .v-good { color: var(--accent); font-weight: 600; }

            .staticrypt-page {
                width: auto;
                padding: 0;
                margin: 0;
            }

            .staticrypt-form {
                position: relative;
                z-index: 1;
                background: var(--white);
                border: 1px solid var(--ink);
                margin: 0 0 24px;
                padding: 28px;
                text-align: left;
                box-shadow: none;
                max-width: none;
            }

            .staticrypt-instructions {
                margin: 0 0 18px;
            }
            .staticrypt-title {
                font-size: 11px;
                letter-spacing: 0.08em;
                text-transform: lowercase;
                color: var(--muted);
                margin: 0 0 6px;
                font-weight: 400;
            }
            .staticrypt-instructions p:not(.staticrypt-title) {
                font-size: 13px;
                color: var(--ink);
                margin: 0;
                line-height: 1.65;
            }

            .staticrypt-hr {
                margin: 14px 0;
                border: 0;
                border-top: 1px solid var(--soft);
            }

            .staticrypt-password-container {
                position: relative;
                outline: 0;
                background: var(--bg);
                border: 1px solid var(--ink);
                width: 100%;
                margin: 0 0 14px;
                box-sizing: border-box;
            }

            .staticrypt-form input[type="password"],
            .staticrypt-form input[type="text"] {
                background: transparent;
                border: 0;
                box-sizing: border-box;
                font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
                font-size: 14px;
                outline: 0;
                padding: 14px 38px 14px 14px;
                width: 100%;
                color: var(--ink);
            }
            .staticrypt-form input::placeholder {
                color: var(--muted);
                text-transform: lowercase;
                letter-spacing: 0.02em;
            }

            .staticrypt-toggle-password-visibility {
                cursor: pointer;
                height: 18px;
                opacity: 55%;
                padding: 14px;
                position: absolute;
                right: 0;
                top: 50%;
                transform: translateY(-50%);
                width: 18px;
            }
            .staticrypt-toggle-password-visibility:hover { opacity: 85%; }

            .staticrypt-form .staticrypt-decrypt-button {
                font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
                text-transform: lowercase;
                letter-spacing: 0.08em;
                outline: 0;
                background: var(--ink);
                width: 100%;
                border: 1px solid var(--ink);
                padding: 14px;
                color: var(--bg);
                font-size: 12px;
                font-weight: 500;
                cursor: pointer;
                transition: background 0.15s ease, color 0.15s ease;
            }
            .staticrypt-form .staticrypt-decrypt-button:hover,
            .staticrypt-form .staticrypt-decrypt-button:active,
            .staticrypt-form .staticrypt-decrypt-button:focus {
                background: var(--accent);
                border-color: var(--accent);
                filter: none;
            }

            label.staticrypt-remember {
                display: flex;
                align-items: center;
                margin-bottom: 14px;
                font-size: 12px;
                color: var(--muted);
                letter-spacing: 0.02em;
            }
            .staticrypt-remember input[type="checkbox"] {
                transform: scale(1.2);
                margin-right: 10px;
                accent-color: var(--accent);
            }

            .hint {
                font-size: 11px;
                letter-spacing: 0.06em;
                color: var(--muted);
                text-transform: lowercase;
                margin: 0;
            }
            .hint code {
                background: var(--soft);
                color: var(--ink);
                padding: 2px 6px;
                font-family: inherit;
                font-size: 11px;
                letter-spacing: 0.04em;
            }

            footer {
                margin-top: 48px; padding: 14px 0;
                border-top: 1px solid var(--ink);
                display: flex; justify-content: space-between; align-items: center;
                gap: 16px; flex-wrap: wrap;
                font-size: 11px; letter-spacing: 0.06em; color: var(--muted);
                text-transform: lowercase;
            }
            footer .foot-mark { color: var(--ink); font-weight: 600; letter-spacing: 0.08em; }
            footer a {
                border: none; color: var(--muted);
                text-transform: lowercase; letter-spacing: 0.06em; font-size: 11px;
                text-decoration: none;
            }
            footer a:hover { color: var(--accent); }

            .hidden { display: none !important; }

            .staticrypt-spinner-container {
                height: 100%;
                display: flex;
                align-items: center;
                justify-content: center;
                background: var(--bg);
            }
            .staticrypt-spinner {
                display: inline-block;
                width: 1.6rem;
                height: 1.6rem;
                vertical-align: text-bottom;
                border: 0.2em solid var(--soft);
                border-right-color: var(--accent);
                border-radius: 50%;
                animation: spinner-border 0.75s linear infinite;
            }
            @keyframes spinner-border {
                100% { transform: rotate(360deg); }
            }

            @media screen and (-webkit-min-device-pixel-ratio: 0) {
                .staticrypt-form input[type="password"],
                .staticrypt-form input[type="text"] {
                    font-size: 16px;
                }
            }

            @media (max-width: 640px) {
                .wrap { padding: 28px 18px 60px; }
                .intro h1 { font-size: 24px; }
                .masthead .brand img { height: 44px; }
            }
        </style>
